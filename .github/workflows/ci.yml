name: SaaS Platform CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: saas
          POSTGRES_DB: saas_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas -d saas_platform"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: saas
          RABBITMQ_DEFAULT_PASS: saas
        ports:
          - 5672:5672

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: saas_platform
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://saas:saas@localhost:5672/
      SECRET_KEY: dev-secret-key
      JWT_SECRET_KEY: dev-jwt-secret-key
      API_V1_STR: /api/v1

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências do backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar sintaxe do backend
        run: |
          python -m compileall -q backend

      - name: Validar sintaxe do agente
        run: |
          python -m compileall -q agent

      - name: Inicializar banco local
        working-directory: backend
        run: |
          PYTHONPATH=. python scripts/init_dev_db.py

      - name: Criar dados de teste
        working-directory: backend
        run: |
          PYTHONPATH=. python scripts/seed_dev_data.py
