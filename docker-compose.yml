services:
  postgres:
    image: postgres:16
    container_name: gabriel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      POSTGRES_DB: saas_platform
    ports:
      - "5432:5432"
    volumes:
      - gabriel_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gabriel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gabriel-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  gabriel_postgres_data:
