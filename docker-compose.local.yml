services:
  postgres:
    image: postgres:16-alpine
    container_name: saas_postgres_local
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      POSTGRES_DB: saas_platform
    ports:
      - "5432:5432"
    volumes:
      - saas_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: saas_redis_local
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: saas_rabbitmq_local
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  saas_postgres_data:
